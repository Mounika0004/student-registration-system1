services:
  - type: web
    name: student-registration-system
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: student-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: student-db
          property: password

databases:
  - name: student-db
    databaseName: student_registration
    plan: free
    user: student_user
